name: 🔍 Fetch IPTV Channels py

on:
  schedule:
    # 每天 UTC 21:00 = 北京时间 05:00
    - cron: '0 21 * * *'
    # 每天 UTC 10:00 = 北京时间 18:00
    - cron: '0 10 * * *'
  workflow_dispatch:      # 允许手动触发，方便测试

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'   # 可根据需要改为 3.10、3.12 或 '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 colorlog

      - name: Run IPTV fetcher script
        run: python iptvFetch.py
        # 如果需要传入参数，例如指定省份，可以写成：
        # run: python iptvFetch.py "1-5" --type multicast hotel

      - name: Upload results as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iptv-results-${{ github.run_id }}
          path: |
            *.txt
            *.json
            multicastList/
            hotelList/
            mqliveList/
            response_files/
            state_files/
          if-no-files-found: warn
